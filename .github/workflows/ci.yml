name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Black format check
        run: black --check src/ tests/
      - name: Mypy type check
        run: mypy src/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: pytest tests/unit -v --cov=secfi_platform --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration -v

  container-build:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -f infra/docker/Dockerfile -t secfi-prime-platform:${{ github.sha }} .
      - name: Smoke test container
        run: |
          docker run -d --name secfi-smoke -p 8000:8000 secfi-prime-platform:${{ github.sha }}
          sleep 5
          docker logs secfi-smoke
          docker stop secfi-smoke

  # Model governance gate: any change touching risk/optimization/pricing
  # logic requires the model-risk checklist to be acknowledged in the PR
  # description before merge to main. See docs/model_risk.md.
  model-risk-checklist-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check for model-risk-impacting changes
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^src/secfi_platform/(risk|optimization|pricing|recall_buyin)/' || true)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
      - name: Require checklist acknowledgement
        if: steps.changed.outputs.changed != ''
        run: |
          if ! echo "${{ github.event.pull_request.body }}" | grep -q "MODEL_RISK_CHECKLIST_ACKNOWLEDGED"; then
            echo "This PR touches risk/optimization/pricing/recall_buyin logic."
            echo "Add 'MODEL_RISK_CHECKLIST_ACKNOWLEDGED' to the PR description after completing docs/model_risk.md checklist."
            exit 1
          fi
